<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Oddparents - Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Shared layout will be injected here -->
  <div id="layout"></div>

  <main class="content">
    <h2>Study Music (Jamendo)</h2>

    <!-- Playlist dropdown -->
    <div class="music-controls">
      <label for="playlistSelect">Choose a playlist:</label>
      <select id="playlistSelect"></select>
    </div>

    <!-- Now playing -->
    <div id="nowPlaying" class="music-card">
      <p>No track playing yet.</p>
    </div>

    <!-- Playback controls -->
    <div class="nav-buttons">
      <button id="playBtn">Play ▶️</button>
      <button id="pauseBtn">Pause ⏸️</button>
      <button id="nextBtn">Next ⏭️</button>
    </div>
  </main>

  <!-- Script -->
  <script type="module" src="js/music.js"></script>
</body>
</html>
