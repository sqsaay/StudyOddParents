<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - The Study OddParents</title>
    <meta name="description"
        content="The Study OddParents will guide into your study journey with flashcards, quotes, and music to keep you motivated.">
    <meta name="author" content="Samantha Salazar">
    <link rel="icon" href="images/favicon.ico">
    <meta property="og:title" content="The Study OddParents">
    <meta property="og:description"
        content="The Study OddParents will guide into your study journey with flashcards, quotes, and music to keep you motivated.">
    <meta property="og:url" content="http://sqsaay.github.io/studyoddparents">
    <meta property="og:locale" content="en_US">
    <meta property="og:image" content="https://sqsaay.github.io/studyoddparents/images/TSO_Logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="The Study OddParents">

    <!--CSS & Scripts-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="../styles/normalize.css">

    <!--Google fonts  Titles-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&family=Quicksand:wght@700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!--End Google fonts  -->
    <!--Google fonts  Body-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!--End Google fonts  -->
</head>

<body>
  <div id="layout"></div>

  <main class="content">
    <h2>Dashboard</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="card-streak">🔥 Day Streak</span>
        <p id="streak">0 Day Streak</p>
      </div>
      <div class="stat-card">
        <span class="card-flashcard">🃏 Flashcards</span>
        <p id="flashcards">0 Flashcards</p>
      </div>
      <div class="stat-card">
        <span class="card-done">✔️ Cards Done</span>
        <p id="cardsDone">0 Cards Done</p>
      </div>
      <div class="stat-card">
        <span class="card-quotes">💬 Quotes</span>
        <p id="quotes">0 Quotes</p>
      </div>
    </div>

    <div class="motivation">
      <h3>Keep it up! You're doing great 🎉</h3>
    </div>
  </main>

  <!-- Use type="module" so ES imports work -->
  <script type="module" src="js/dashboard.js"></script>
</body>


</html>>
